<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Science Alive Terminal</title>

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <link rel="stylesheet" href="/style.css"/>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">&gt;_</div>
      <div class="logo-name">Science Alive Terminal</div>
    </div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Connecting…</span>
    </div>
    <button class="btn is-hidden" id="adminBtn" onclick="openAdmin()">Admin</button>
    <div class="spacer"></div>
  </header>

  <!-- Terminal -->
  <div class="terminal-wrap">
    <div class="terminal-frame">
      <div id="terminal"></div>
    </div>
  </div>

  <!-- Admin Modal -->
  <div class="modal-overlay is-hidden" id="adminModal">
    <div class="modal-box">
      <div class="modal-header">
        <button class="btn-sm" id="adminRefreshBtn" onclick="populateAdminPanel()">⟳</button>
        <button class="modal-close" onclick="closeAdmin()">✕</button>
      </div>
      <div class="table-wrap" style="text-align:left;">
        <table>
          <thead>
            <tr>
              <th>Volume Name</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="adminModalContent"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    checkAdmin();

    // ── xterm setup ──────────────────────────────────────────────────────────
    const term = new Terminal({
      fontFamily: '"JetBrains Mono", "Fira Code", monospace',
      fontSize: 14,
      lineHeight: 1.4,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      theme: {
        background:      '#0a0c10',
        foreground:      '#c8d0e0',
        cursor:          '#00e5a0',
        cursorAccent:    '#0a0c10',
        selectionBackground: 'rgba(0,229,160,0.2)',
        black:   '#1e2230', brightBlack:   '#4a5270',
        red:     '#ff4f6d', brightRed:     '#ff7088',
        green:   '#00e5a0', brightGreen:   '#33ffb8',
        yellow:  '#ffcd40', brightYellow:  '#ffe080',
        blue:    '#00b8ff', brightBlue:    '#40cfff',
        magenta: '#c678dd', brightMagenta: '#d99fe8',
        cyan:    '#56d1e0', brightCyan:    '#80e8f0',
        white:   '#c8d0e0', brightWhite:   '#ffffff',
      }
    });

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // ── WebSocket ────────────────────────────────────────────────────────────
    let ws = null;

    function setStatus(state, text) {
      const pill = document.getElementById('statusPill');
      const label = document.getElementById('statusText');
      pill.className = `status-pill ${state}`;
      label.textContent = text;
    }

    // ── Admin ────────────────────────────────────────────────────────────

    async function checkAdmin() {
      const btn = document.getElementById('adminBtn');

      try {
        const token = sessionStorage.getItem('token');
        const username = sessionStorage.getItem('username');
        
        //send admin request to server
        const res = await fetch('/api/isAdmin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, token })
        });

        const data = await res.json();

        if (!res.ok) {
          console.log("Error: isAdmin fail");
          return;
        }

        //if request successful show admin button
        btn.classList.remove('is-hidden');

      } catch (e) {
        console.log('Could not reach the server.');
      }
    }

    async function openAdmin() {
      const btn = document.getElementById('adminBtn');

      btn.disabled = true;
      btn.textContent = 'Loading…';

      try {
        document.getElementById('adminModal').classList.remove('is-hidden');
        populateAdminPanel();
      } catch (e) {
        // no-op
      } finally {
        btn.disabled = false;
        btn.textContent = 'Admin';
      }
    }

    function closeAdmin() {
      document.getElementById('adminModal').classList.add('is-hidden');
    }

    async function populateAdminPanel(){
      try {
        const tbody = document.getElementById('adminModalContent');
        let token = sessionStorage.getItem('token');
        let username = sessionStorage.getItem('username');

        const res = await fetch('/api/populateAdmin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, token })
        });

        const data = await res.json();

        if (!res.ok) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty"></td></tr>';
          tbody.querySelector('.empty').textContent = data.error || 'Failed to load volumes.';
          return;
        }

        if (!data.volumes.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty">No volumes found.</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        data.volumes.forEach(v => {
          const tr = document.createElement('tr');

          const nameTd = document.createElement('td');
          nameTd.textContent = v.name;

          const statusTd = document.createElement('td');
          const badge = document.createElement('span');
          badge.className = `status-badge ${v.active ? 'active' : 'inactive'}`;
          badge.textContent = v.active ? 'Active' : 'Inactive';
          statusTd.appendChild(badge);

          const actionsTd = document.createElement('td');
          actionsTd.className = 'actions';
          actionsTd.style.justifyContent = 'flex-end';

          const dropdown = document.createElement('div');
          dropdown.className = 'dropdown';

          const menu = document.createElement('div');
          menu.className = 'dropdown-menu is-hidden';

          const toggleBtn = document.createElement('button');
          toggleBtn.className = 'dropdown-toggle';
          toggleBtn.textContent = '⋯';
          toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            document.querySelectorAll('.dropdown-menu').forEach(el => {
              if (el !== menu) el.classList.add('is-hidden');
            });
            menu.classList.toggle('is-hidden');
          });

          const endBtn = document.createElement('button');
          endBtn.textContent = 'End session';
          endBtn.disabled = !v.active;
          endBtn.addEventListener('click', () => endSession(v.name));

          const delBtn = document.createElement('button');
          delBtn.className = 'danger';
          delBtn.textContent = 'Delete volume';
          delBtn.addEventListener('click', () => deleteVolume(v.name));

          menu.appendChild(endBtn);
          menu.appendChild(delBtn);
          dropdown.appendChild(toggleBtn);
          dropdown.appendChild(menu);
          actionsTd.appendChild(dropdown);

          tr.appendChild(nameTd);
          tr.appendChild(statusTd);
          tr.appendChild(actionsTd);
          tbody.appendChild(tr);
        });

      } catch (e) {
        console.log('Could not reach the server.');
      }
    }

    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown-menu').forEach(el => el.classList.add('is-hidden'));
    });

    async function endSession(name) {
      if (!confirm(`End session for "${name}"?`)) return;
      await adminAction('/api/endSession', name);
    }

    async function deleteVolume(name) {
      if (!confirm(`Delete volume "${name}"? This cannot be undone.`)) return;
      await adminAction('/api/deleteVolume', name);
    }

    async function adminAction(url, target) {
      try {
        const token = sessionStorage.getItem('token');
        const username = sessionStorage.getItem('username');

        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, token, target })
        });

        const data = await res.json();
        if (!res.ok) alert(data.error || 'Action failed.');
      } catch (e) {
        alert('Could not reach the server.');
      } finally {
        populateAdminPanel();
      }
    }

    function connect() {
      let token = sessionStorage.getItem('token');
      let username = sessionStorage.getItem('username');
      
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}?username=${username}&token=${token}`);

      ws.onopen = () => {
        setStatus('connected', 'Connected');
        // Send initial size
    
        fitAddon.fit();
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'output') term.write(msg.data);
        if (msg.type === 'exit')   { setStatus('error', 'Session ended'); }
      };

      ws.onerror = () => setStatus('error', 'Connection error');

      ws.onclose = () => {
        setStatus('', 'Disconnected');
        showOverlay(true);
      };
    }

    // Terminal → server
    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    // Resize → server
    const ro = new ResizeObserver(() => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });
    ro.observe(document.getElementById('terminal'));

    // ── Boot ─────────────────────────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
